# ================================================================
# Configuration Netlify
# ================================================================
# Pour déployer :
# 1. Créez un compte sur netlify.com
# 2. "Add new site" → "Deploy manually" → glissez le dossier
# OU connectez votre repo GitHub pour un déploiement auto.
# ================================================================

[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
